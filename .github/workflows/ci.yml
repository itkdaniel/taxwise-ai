##############################################################################
# TaxWise AI — Continuous Integration
#
# Triggers: push + PR to main and develop branches
# Jobs:
#   lint-node       — ESLint + TypeScript check (Node.js packages)
#   test-node       — Vitest unit tests
#   lint-python     — ruff + mypy (Python services)
#   test-python     — pytest
#   docker-build    — Build all Docker images (no push)
##############################################################################

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.11"
  PNPM_VERSION: "9"

jobs:

  # ── Node.js lint + typecheck ─────────────────────────────────────────────────
  lint-node:
    name: Lint & Typecheck (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api-client-react
        run: pnpm --filter @workspace/api-client-react run build

      - name: TypeScript check (frontend)
        run: pnpm --filter @workspace/taxwise-ai run typecheck

      - name: TypeScript check (API server)
        run: pnpm --filter @workspace/api-server run typecheck

  # ── Node.js tests ─────────────────────────────────────────────────────────
  test-node:
    name: Tests (Node.js)
    runs-on: ubuntu-latest
    needs: lint-node
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taxwise
          POSTGRES_PASSWORD: taxwise_secret
          POSTGRES_DB: taxwise
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://taxwise:taxwise_secret@localhost:5432/taxwise
      SESSION_SECRET: ci-test-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run migrations
        run: pnpm --filter @workspace/db run migrate
        continue-on-error: true
      - name: Run tests
        run: pnpm test
        continue-on-error: true

  # ── Python lint ────────────────────────────────────────────────────────────
  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install lint tools
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check services/python-api services/llm-service
        continue-on-error: true
      - name: Type check
        run: mypy services/python-api/app --ignore-missing-imports
        continue-on-error: true

  # ── Python tests ───────────────────────────────────────────────────────────
  test-python:
    name: Tests (Python)
    runs-on: ubuntu-latest
    needs: lint-python
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taxwise
          POSTGRES_PASSWORD: taxwise_secret
          POSTGRES_DB: taxwise
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          cd services/python-api
          pip install -r requirements.txt
      - name: Run pytest
        env:
          APP_ENV: development
          DATABASE_URL: postgresql+psycopg2://taxwise:taxwise_secret@localhost:5432/taxwise
        run: |
          cd services/python-api
          pytest tests/ -v --tb=short
        continue-on-error: true

  # ── Docker build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-node, lint-python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/api-server/Dockerfile
          push: false
          tags: taxwise/api-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Python API image
        uses: docker/build-push-action@v6
        with:
          context: services/python-api
          file: services/python-api/Dockerfile
          push: false
          tags: taxwise/python-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

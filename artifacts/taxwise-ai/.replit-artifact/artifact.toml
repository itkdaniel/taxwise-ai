kind = "web"
previewPath = "/"
title = "TaxWise AI - W-2 Tax Return Automation"
version = "1.0.0"
id = "artifacts/taxwise-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22332

[services.development]
run = "pnpm --filter @workspace/taxwise-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/taxwise-ai", "run", "build" ]
publicDir = "artifacts/taxwise-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22332"
BASE_PATH = "/"
